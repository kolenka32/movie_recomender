{% extends "movies/base.html" %}

{% block title %}Редактировать профиль{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto py-10">

    <h1 class="text-3xl font-bold mb-6 text-white">Редактировать профиль</h1>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-gray-400 mb-2">Имя</label>
            <input type="text" name="first_name"
                   value="{{ user.first_name }}"
                   class="w-full bg-[#222] p-3 rounded text-white">
        </div>

        <div>
            <label class="block text-gray-400 mb-2">Фамилия</label>
            <input type="text" name="last_name"
                   value="{{ user.last_name }}"
                   class="w-full bg-[#222] p-3 rounded text-white">
        </div>

        <div>
            <label class="block text-gray-400 mb-2">Email</label>
            <input type="email" name="email"
                   value="{{ user.email }}"
                   class="w-full bg-[#222] p-3 rounded text-white">
        </div>

        <button type="submit"
                class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded text-white font-semibold">
            Сохранить
        </button>
    </form>

</div>

{% endblock %}
