<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
<form method="get" class="flex gap-2">
    <input
        type="text"
        name="q"
        placeholder="Поиск фильма..."
        class="px-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-black"
    >
    <button
        type="submit"
        class="px-4 py-2 bg-black text-white rounded-xl hover:opacity-90 transition"
    >
        Найти
    </button>
</form>
{% block content %}{% endblock %}
</body>
</html>
