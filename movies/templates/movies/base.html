<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Netflix{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-[#141414] text-white min-h-screen">
    <!-- Netflix-style header -->
    <header class="fixed top-0 w-full z-50 bg-gradient-to-b from-black/80 to-transparent px-4 md:px-16 py-4">
        <div class="flex items-center justify-between">
            <!-- Left section with logo -->
            <div class="flex items-center gap-8">
                <a class="text-[#E50914] text-3xl font-bold tracking-tighter cursor-pointer"
                   href="{% url 'movies:index' %}">NETFLIX</a>
            </div>

            <!-- Center navigation text-[#E50914] -->
            <nav class="hidden md:flex gap-6 text-sm font-light absolute left-1/2 -translate-x-1/2">
                <a href="/" class="hover:text-gray-300 transition">Главная</a>
                <a href="#" class="hover:text-gray-300 transition">Сериалы</a>
                <a href="#" class="hover:text-gray-300 transition">Фильмы</a>
                <a href="#" class="hover:text-gray-300 transition">Новинки</a>
                <a href="#" class="hover:text-gray-300 transition">Мой список</a>
            </nav>

            <!-- Right section with search and profile -->
            <div class="flex items-center gap-4">
                <!-- Search form -->
                <form method="get" class="flex items-center">
                    <div class="relative">
                        <input
                            type="text"
                            name="q"
                            placeholder="Поиск"
                            class="w-48 md:w-64 bg-black/70 border border-gray-600 rounded-md px-4 py-2 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-white transition"
                        >
                        <button
                            type="submit"
                            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                            </svg>
                        </button>
                    </div>
                </form>

                <!-- Profile icon - ultra minimal -->
                <a href="#" class="flex items-center justify-center w-8 h-8 text-gray-400 hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.3" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main content with top padding for fixed header -->
    <main class="pt-24 px-4 md:px-16 pb-16">
            {% block content %}

            {% endblock %}
    </main>
</body>
</html>
