<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MovieRec{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-[#0b0b0c] text-neutral-200 min-h-screen flex flex-col selection:bg-white selection:text-black">

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-black/40 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">

            <!-- Лого -->
            <a href="#" class="flex items-center gap-3 group">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-white to-neutral-300
                            text-black flex items-center justify-center font-bold text-lg
                            shadow-lg shadow-white/5">
                    🎬
                </div>
                <span class="text-xl font-semibold tracking-tight text-white group-hover:opacity-80 transition">
                    MovieRec
                </span>
            </a>

            <!-- Поиск -->
            <form method="get" action="#" class="flex-1 max-w-xl mx-10 hidden md:block">
                <input
                    type="text"
                    name="query"
                    placeholder="Поиск фильмов..."
                    value="{{ request.GET.query }}"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-2.5
                           text-sm placeholder-neutral-500
                           focus:outline-none focus:ring-1 focus:ring-white/30
                           transition"
                >
            </form>

            <!-- Auth buttons -->
            <div class="flex items-center gap-4">

                {% if user.is_authenticated %}

                    <!-- Аккаунт -->
                    <a href="#"
                       class="px-5 py-2 rounded-2xl text-sm font-medium
                              bg-white text-black
                              hover:bg-neutral-200
                              transition shadow-md shadow-white/10">
                        {{ user.username }}
                    </a>

                {% else %}

                    <!-- Вход -->
                    <a href="#"
                       class="px-4 py-2 text-sm text-neutral-300
                              hover:text-white transition">
                        Вход
                    </a>

                    <!-- Регистрация -->
                    <a href="#"
                       class="px-5 py-2 rounded-2xl text-sm font-medium
                              bg-white text-black
                              hover:bg-neutral-200
                              transition shadow-md shadow-white/10">
                        Регистрация
                    </a>

                {% endif %}

            </div>

        </div>

        <!-- Мобильный поиск -->
        <div class="px-6 pb-4 md:hidden">
            <form method="get" action="#">
                <input
                    type="text"
                    name="query"
                    placeholder="Поиск фильмов..."
                    value="{{ request.GET.query }}"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-2.5
                           text-sm placeholder-neutral-500
                           focus:outline-none focus:ring-1 focus:ring-white/30"
                >
            </form>
        </div>
    </header>

    <!-- Контент -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-8 py-14">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 text-center py-8 text-sm text-neutral-500">
        © {% now "Y" %} MovieRec
    </footer>

</body>
</html>
